<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>TD 06 – Vérifier avec SonarQube</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --color-background-primary: #232118;
        --color-background-secondary: #2c2a20;
        --color-text-primary: #efede6;
        --color-text-secondary: #908e86;
        --color-border-secondary: rgba(255, 255, 255, 0.1);
        --color-border-tertiary: rgba(255, 255, 255, 0.07);
        --color-border-info: #4a87e8;
        --color-background-info: rgba(74, 135, 232, 0.16);
        --color-text-info: #80aae8;
        --color-text-success: #4ac48a;
        --color-text-danger: #e06b6b;
        --font-mono:
          ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas,
          "Courier New", monospace;
      }
      body {
        background: #1c1b18;
        color: #efede6;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        padding: 18px 20px;
      }
      .nb {
        font-size: 13px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 0.5px solid var(--color-border-secondary);
        background: transparent;
        color: var(--color-text-primary);
        cursor: pointer;
        transition: background 0.15s;
      }
      .nb:hover {
        background: var(--color-background-secondary);
      }
      .nb.on {
        background: var(--color-background-info);
        color: var(--color-text-info);
        border-color: var(--color-border-info);
      }
      .card {
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: 12px;
        padding: 14px 16px;
        margin: 10px 0;
      }
      .code {
        font-family: var(--font-mono);
        font-size: 12px;
        background: #101009;
        border-radius: 8px;
        padding: 12px 14px;
        line-height: 1.9;
        white-space: pre;
        overflow-x: auto;
        color: var(--color-text-primary);
        margin: 8px 0;
      }
      .kw {
        color: #afa9ec;
        font-weight: 500;
      }
      .fl {
        color: #85b7eb;
        font-weight: 500;
      }
      .cm {
        color: #6a6860;
      }
      .st {
        color: #5dcaa5;
      }
      .nm {
        color: #f0997b;
      }
      .pill {
        display: inline-block;
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 12px;
        font-weight: 500;
        margin-right: 4px;
      }
      .pb {
        background: #0c447c;
        color: #b5d4f4;
      }
      .pg {
        background: #085041;
        color: #9fe1cb;
      }
      .pp {
        background: #3c3489;
        color: #cecbf6;
      }
      .pa {
        background: #633806;
        color: #fac775;
      }
      .pc {
        background: #712b13;
        color: #f5c4b3;
      }
      .pr {
        background: #791f1f;
        color: #f7c1c1;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade {
        animation: fadeIn 0.22s ease;
      }
      @keyframes flow {
        from {
          stroke-dashoffset: 20;
        }
        to {
          stroke-dashoffset: 0;
        }
      }
      .fan {
        stroke-dasharray: 6 4;
        animation: flow 1.2s linear infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .pulse {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div style="padding: 0.5rem 0">
      <div
        style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem"
      >
        <button class="nb on" onclick="tab('intro', this)">C'est quoi ?</button>
        <button class="nb" onclick="tab('archi', this)">Architecture</button>
        <button class="nb" onclick="tab('categories', this)">Catégories</button>
        <button class="nb" onclick="tab('qualitygate', this)">
          Quality Gate
        </button>
        <button class="nb" onclick="tab('complexite', this)">Complexité</button>
        <button class="nb" onclick="tab('coverage', this)">
          Couverture tests
        </button>
        <button class="nb" onclick="tab('commandes', this)">
          Toutes les commandes
        </button>
      </div>
      <div id="zone"></div>
    </div>

    <script>
      const TABS = {
        /* ══════════════ INTRO ══════════════ */
        intro: `<div class="fade">
<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 12px;line-height:1.7">
Imagine que tu écris un devoir. SonarQube c'est le <strong>correcteur automatique</strong> de ton code 🔍 — il lit tout ton code SANS l'exécuter, trouve les fautes, les zones dangereuses, les répétitions inutiles, et te donne une note. Clique sur chaque brique pour comprendre.
</p>
<svg width="100%" viewBox="0 0 680 300">
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<!-- Toi / ton code -->
<g onclick="xi('dev')" style="cursor:pointer">
  <rect x="10" y="110" width="110" height="70" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="22" x="65" y="148" text-anchor="middle">👨‍💻</text>
  <text font-size="11" font-weight="500" x="65" y="168" text-anchor="middle" fill="#0C447C">Ton code Java</text>
  <text font-size="10" x="65" y="182" text-anchor="middle" fill="#185FA5">ou Python</text>
</g>
<!-- flèche code → scanner -->
<line class="fan" x1="122" y1="145" x2="188" y2="145" stroke="#378ADD" stroke-width="2" marker-end="url(#ar)"/>
<text font-size="10" x="155" y="138" text-anchor="middle" fill="#888780">analyse</text>
<!-- Scanner -->
<g onclick="xi('scanner')" style="cursor:pointer">
  <rect x="190" y="90" width="140" height="110" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text font-size="22" x="260" y="133" text-anchor="middle">🔬</text>
  <text font-size="13" font-weight="500" x="260" y="155" text-anchor="middle" fill="#3C3489">Sonar Scanner</text>
  <text font-size="10" x="260" y="172" text-anchor="middle" fill="#534AB7">lit le code</text>
  <text font-size="10" x="260" y="186" text-anchor="middle" fill="#534AB7">génère rapport</text>
</g>
<!-- flèche scanner → serveur -->
<line class="fan" x1="332" y1="145" x2="398" y2="145" stroke="#534AB7" stroke-width="2" marker-end="url(#ar)"/>
<text font-size="10" x="365" y="138" text-anchor="middle" fill="#888780">envoie</text>
<!-- Serveur SonarQube -->
<g onclick="xi('server')" style="cursor:pointer">
  <rect x="400" y="70" width="160" height="150" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text font-size="22" x="480" y="120" text-anchor="middle">🖥️</text>
  <text font-size="13" font-weight="500" x="480" y="142" text-anchor="middle" fill="#085041">Serveur SonarQube</text>
  <text font-size="10" x="480" y="160" text-anchor="middle" fill="#0F6E56">localhost:9000</text>
  <text font-size="10" x="480" y="176" text-anchor="middle" fill="#0F6E56">stocke résultats</text>
  <text font-size="10" x="480" y="192" text-anchor="middle" fill="#0F6E56">interface web</text>
  <text font-size="10" x="480" y="208" text-anchor="middle" fill="#0F6E56">Quality Gate</text>
</g>
<!-- Token -->
<g onclick="xi('token')" style="cursor:pointer">
  <rect x="220" y="240" width="220" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="12" font-weight="500" x="330" y="258" text-anchor="middle" fill="#633806">🔑 Token d'auth</text>
  <text font-size="10" x="330" y="275" text-anchor="middle" fill="#854F0B">mot de passe entre Scanner ↔ Serveur</text>
</g>
<line x1="330" y1="238" x2="330" y2="202" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="3 3"/>
<!-- réseau docker -->
<rect x="180" y="58" width="400" height="178" rx="14" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="6 4"/>
<text font-size="11" x="380" y="54" text-anchor="middle" fill="#D85A30">sonar-network (réseau Docker)</text>
</svg>
<div id="xi-box" class="card" style="min-height:68px;margin-top:4px">
  <p style="font-size:13px;color:var(--color-text-secondary);margin:0">👆 Clique sur une brique pour voir l'explication.</p>
</div>
</div>`,

        /* ══════════════ ARCHI ══════════════ */
        archi: `<div class="fade">
<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.7">
SonarQube fonctionne en <strong>3 étapes</strong> : tu prépares le projet, le Scanner analyse, le Serveur affiche. Clique sur chaque étape.
</p>
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
  <button class="nb on" id="ar0" onclick="showAr(0,this)">Étape 1 — Préparer</button>
  <button class="nb" id="ar1" onclick="showAr(1,this)">Étape 2 — Scanner</button>
  <button class="nb" id="ar2" onclick="showAr(2,this)">Étape 3 — Consulter</button>
  <button class="nb" id="ar3" onclick="showAr(3,this)">sonar-project.properties</button>
</div>
<div id="ar-box"></div>
</div>`,

        /* ══════════════ CATEGORIES ══════════════ */
        categories: `<div class="fade">
<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.7">
SonarQube analyse ton code selon <strong>7 catégories</strong>. Chacune a une note de A (très bien) à E (critique). Clique sur chaque catégorie.
</p>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
  ${["Bugs", "Vulnérabilités", "Hotspots", "Code Smells", "Coverage", "Duplications", "Lines", "Notes A→E"].map((c, i) => `<button class="nb${i === 0 ? " on" : ""}" id="cat${i}" onclick="showCat(${i},this)">${c}</button>`).join("")}
</div>
<div id="cat-box"></div>
</div>`,

        /* ══════════════ QUALITY GATE ══════════════ */
        qualitygate: `<div class="fade">
<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.7">
La <strong>Quality Gate</strong> c'est le <strong>barème de l'exam</strong> : si ton code ne respecte pas ces critères → ÉCHEC. Sinon → SUCCÈS. Tu peux simuler ici.
</p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
  <div class="card">
    <p style="font-size:12px;font-weight:500;margin:0 0 10px;color:var(--color-text-primary)">Simule ton projet</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <label style="font-size:12px;color:var(--color-text-secondary)">Bugs critiques</label>
        <input type="range" id="bugs-sl" min="0" max="10" value="0" style="width:100%" oninput="updateQG()">
        <span id="bugs-v" style="font-size:12px;font-weight:500">0</span>
      </div>
      <div>
        <label style="font-size:12px;color:var(--color-text-secondary)">Couverture tests %</label>
        <input type="range" id="cov-sl" min="0" max="100" value="85" style="width:100%" oninput="updateQG()">
        <span id="cov-v" style="font-size:12px;font-weight:500">85%</span>
      </div>
      <div>
        <label style="font-size:12px;color:var(--color-text-secondary)">Duplication code %</label>
        <input type="range" id="dup-sl" min="0" max="30" value="1" style="width:100%" oninput="updateQG()">
        <span id="dup-v" style="font-size:12px;font-weight:500">1%</span>
      </div>
    </div>
  </div>
  <div>
    <canvas id="qg-canvas" width="300" height="200" style="width:100%;border-radius:12px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)"></canvas>
    <div id="qg-result" style="text-align:center;margin-top:8px;font-size:15px;font-weight:500"></div>
  </div>
</div>
<div class="card" style="border-left:3px solid #1D9E75">
  <p style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin:0 0 6px">Critères Quality Gate par défaut</p>
  <div style="display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12px;align-items:center">
    <span class="pill pg">Requis</span><span style="color:var(--color-text-primary)">0 bugs ou vulnérabilités critiques</span>
    <span class="pill pg">Requis</span><span style="color:var(--color-text-primary)">Couverture tests ≥ 80%</span>
    <span class="pill pg">Requis</span><span style="color:var(--color-text-primary)">Duplication code ≤ 3%</span>
  </div>
</div>
</div>`,

        /* ══════════════ COMPLEXITE ══════════════ */
        complexite: `<div class="fade">
<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.7">
La <strong>complexité cognitive</strong>, c'est mesurer à quel point ton code est difficile à lire. Trop de if imbriqués = code spaghetti 🍝. SonarQube te dit quand c'est trop. Clique pour voir la différence.
</p>
<div style="display:flex;gap:8px;margin-bottom:12px">
  <button class="nb on" id="cx0" onclick="showCx(0,this)">Code TROP complexe ❌</button>
  <button class="nb" id="cx1" onclick="showCx(1,this)">Code simplifié ✅</button>
</div>
<div id="cx-box"></div>
</div>`,

        /* ══════════════ COVERAGE ══════════════ */
        coverage: `<div class="fade">
<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.7">
La <strong>couverture de tests</strong> mesure combien de ton code est vérifié par des tests automatiques. SonarQube ne calcule pas ça lui-même — il lit le rapport généré par <strong>JaCoCo</strong> (Java) ou <strong>coverage</strong> (Python).
</p>
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
  <button class="nb on" id="cv0" onclick="showCv(0,this)">C'est quoi ?</button>
  <button class="nb" id="cv1" onclick="showCv(1,this)">JaCoCo (Java)</button>
  <button class="nb" id="cv2" onclick="showCv(2,this)">Coverage (Python)</button>
  <button class="nb" id="cv3" onclick="showCv(3,this)">Vulnérabilités SQL</button>
</div>
<div id="cv-box"></div>
</div>`,

        /* ══════════════ COMMANDES ══════════════ */
        commandes: `<div class="fade">
<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 12px;line-height:1.7">Toutes les commandes du TD06, décortiquées. Clique pour déplier.</p>
<div id="cmd-list"></div>
</div>`,
      };

      /* ══ XI BRIQUES INTRO ══ */
      const XI = {
        dev: {
          t: "👨‍💻 Ton code",
          c: "#85B7EB",
          tx: "Tu écris du code Java ou Python. Tu veux savoir s'il est propre, sécurisé et bien testé avant de le livrer. C'est là que SonarQube entre en jeu — il fait une \"relecture automatique\" de tout ton code.",
        },
        scanner: {
          t: "🔬 Sonar Scanner",
          c: "#AFA9EC",
          tx: "C'est le \"lecteur\" de code. Il tourne dans un conteneur Docker, lit chaque ligne de ton code, applique des centaines de règles de qualité, et génère un rapport. Ce rapport est ensuite envoyé au serveur. Il a besoin d'un token pour s'authentifier.",
        },
        server: {
          t: "🖥️ Serveur SonarQube",
          c: "#5DCAA5",
          tx: "C'est le \"tableau de bord\". Il reçoit le rapport du Scanner, le traite, et l'affiche sur une interface web sur localhost:9000. Tu vois les bugs, les notes, la couverture de tests... C'est lui qui décide si ton projet passe ou échoue la Quality Gate.",
        },
        token: {
          t: "🔑 Token d'authentification",
          c: "#FAC775",
          tx: "C'est un mot de passe unique généré par le serveur. Le Scanner en a besoin pour envoyer ses rapports sans que tu doives saisir un login/password à chaque fois. Important : une fois généré, copie-le immédiatement — il ne sera plus jamais affiché !",
        },
      };

      /* ══ ARCHI ══ */
      const ARS = [
        {
          t: "Étape 1 — Préparer ton projet",
          svg: `<svg width="100%" viewBox="0 0 680 200">
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="20" y="20" width="180" height="160" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="110" y="44" text-anchor="middle" fill="#0C447C">📁 Ton projet</text>
<text font-size="11" x="36" y="68" fill="#0C447C">src/main/java/</text>
<text font-size="11" x="36" y="86" fill="#0C447C">  HelloWorld.java</text>
<text font-size="11" x="36" y="104" fill="#0C447C">  ComplexMethod.java</text>
<text font-size="11" x="36" y="122" fill="#0F6E56">sonar-project.properties</text>
<text font-size="10" x="110" y="148" text-anchor="middle" fill="#888780">fichier config obligatoire</text>
<text font-size="10" x="110" y="164" text-anchor="middle" fill="#888780">+ mvn clean compile</text>
<line x1="202" y1="100" x2="258" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="260" y="40" width="380" height="120" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="450" y="62" text-anchor="middle" fill="#085041">sonar-project.properties</text>
<text font-size="11" x="276" y="84" fill="#0F6E56">sonar.projectKey=quality-demo-java</text>
<text font-size="11" x="276" y="100" fill="#0F6E56">sonar.sources=src/main/java</text>
<text font-size="11" x="276" y="116" fill="#0F6E56">sonar.java.binaries=target/classes</text>
<text font-size="10" x="276" y="144" fill="#888780">Ce fichier dit au Scanner QUOI analyser et OÙ</text>
</svg>`,
          tx: "Avant d'analyser, tu dois créer le fichier <code>sonar-project.properties</code> à la racine de ton projet. C'est la carte d'identité de ton projet pour SonarQube. Pour Java, tu dois aussi compiler d'abord avec <code>mvn clean compile</code> car SonarQube a besoin des fichiers .class compilés.",
        },

        {
          t: "Étape 2 — Lancer le Scanner",
          svg: `<svg width="100%" viewBox="0 0 680 160">
<rect x="20" y="20" width="640" height="120" rx="10" fill="#1a1915"/>
<text font-size="11" font-family="monospace" x="36" y="48" fill="#5DCAA5">$ docker run --rm \\</text>
<text font-size="11" font-family="monospace" x="36" y="66" fill="#efede6">  --network sonar-network \\</text>
<text font-size="11" font-family="monospace" x="36" y="84" fill="#efede6">  -v "$(pwd):/usr/src" \\</text>
<text font-size="11" font-family="monospace" x="36" y="102" fill="#FAC775">  -e SONAR_HOST_URL="http://sonarqube:9000" \\</text>
<text font-size="11" font-family="monospace" x="36" y="120" fill="#FAC775">  -e SONAR_TOKEN="ton_token_ici" \\</text>
<text font-size="11" font-family="monospace" x="36" y="138" fill="#5DCAA5">  sonarsource/sonar-scanner-cli</text>
</svg>`,
          tx: "Une seule commande Docker pour lancer l'analyse. Le Scanner lit ton code (via le volume -v), se connecte au serveur SonarQube (via le réseau Docker et l'URL), s'authentifie avec le token, puis envoie tout le rapport. Après quelques secondes → regarde localhost:9000 !",
        },

        {
          t: "Étape 3 — Consulter les résultats",
          svg: `<svg width="100%" viewBox="0 0 680 200">
<rect x="20" y="20" width="640" height="160" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="44" text-anchor="middle" fill="#3C3489">Interface web → localhost:9000/projects</text>
<rect x="40" y="58" width="82" height="52" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="81" y="78" text-anchor="middle" fill="#791F1F">🐛 Bugs</text>
<text font-size="12" font-weight="500" x="81" y="98" text-anchor="middle" fill="#A32D2D">2</text>
<rect x="136" y="58" width="82" height="52" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="177" y="78" text-anchor="middle" fill="#712B13">🔓 Vuln.</text>
<text font-size="12" font-weight="500" x="177" y="98" text-anchor="middle" fill="#993C1D">1</text>
<rect x="232" y="58" width="82" height="52" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="273" y="78" text-anchor="middle" fill="#633806">💩 Smells</text>
<text font-size="12" font-weight="500" x="273" y="98" text-anchor="middle" fill="#854F0B">14</text>

      /* ══ QG CANVAS ══ */
      function updateQG() {
        const bugs = parseInt(document.getElementById("bugs-sl").value);
        const cov = parseInt(document.getElementById("cov-sl").value);
        const dup = parseFloat(document.getElementById("dup-sl").value);
        document.getElementById("bugs-v").textContent = bugs;
        document.getElementById("cov-v").textContent = cov + "%";
        document.getElementById("dup-v").textContent = dup + "%";
        const ok1 = bugs === 0,
          ok2 = cov >= 80,
          ok3 = dup <= 3;
        const pass = ok1 && ok2 && ok3;
        drawQG(bugs, cov, dup, ok1, ok2, ok3, pass);
        const res = document.getElementById("qg-result");
        if (res) {
          res.textContent = pass
            ? "✅ Quality Gate PASSED !"
            : "❌ Quality Gate FAILED";
          res.style.color = pass
            ? "var(--color-text-success)"
            : "var(--color-text-danger)";
        }
      }
      function drawQG(bugs, cov, dup, ok1, ok2, ok3, pass) {
        const cv = document.getElementById("qg-canvas");
        if (!cv) return;
        const ctx = cv.getContext("2d"),
          W = cv.width,
          H = cv.height;
        ctx.clearRect(0, 0, W, H);
        /* force dark palette */
        const items = [
          { l: "Bugs critiques", v: bugs + " bug(s)", ok: ok1, seuil: "= 0" },
          { l: "Couverture", v: cov + "%", ok: ok2, seuil: "≥ 80%" },
          { l: "Duplication", v: dup + "%", ok: ok3, seuil: "≤ 3%" },
        ];
        items.forEach((it, i) => {
          const y = 30 + i * 52;
          ctx.fillStyle = it.ok ? "#085041" : "#791F1F";
          rr(ctx, 10, y, W - 20, 40, 8);
          ctx.fill();
          ctx.strokeStyle = it.ok ? "#1D9E75" : "#A32D2D";
          ctx.lineWidth = 0.8;
          rr(ctx, 10, y, W - 20, 40, 8);
          ctx.stroke();
          ctx.fillStyle = it.ok ? "#9FE1CB" : "#F7C1C1";
          ctx.font = "bold 13px sans-serif";
          ctx.textAlign = "left";
          ctx.fillText((it.ok ? "✅ " : "❌ ") + it.l, 20, y + 16);
          ctx.font = "11px sans-serif";
          ctx.fillStyle = "#908e86";
          ctx.fillText(it.v + " (seuil: " + it.seuil + ")", 20, y + 32);
        });
        ctx.fillStyle = pass ? "#085041" : "#791F1F";
        rr(ctx, 10, 190, W - 20, 50, 10);
        ctx.fill();
        ctx.strokeStyle = pass ? "#1D9E75" : "#A32D2D";
        ctx.lineWidth = 2;
        rr(ctx, 10, 190, W - 20, 50, 10);
        ctx.stroke();
        ctx.fillStyle = pass ? "#9FE1CB" : "#F7C1C1";
        ctx.font = "bold 16px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(pass ? "PASSED ✅" : "FAILED ❌", W / 2, 222);
      }
      function rr(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

        if (key === "qualitygate") setTimeout(() => updateQG(), 50);
