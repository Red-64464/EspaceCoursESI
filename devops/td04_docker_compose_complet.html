/* ══ NETWORK ANIMATION ══ */
let netTimer=null,netRunning=false,netStep=0;
function toggleNet(){
  netRunning?stopNet():startNet();
  const b=document.getElementById('net-btn'); if(b) b.textContent=netRunning?'⏹ Arrêter':'▶ Simuler la communication';
}
function stopNet(){clearInterval(netTimer);netRunning=false;const b=document.getElementById('net-btn');if(b)b.textContent='▶ Simuler la communication';}
function startNet(){
  netRunning=true;netStep=0;
  drawNet(-1,'');
  netTimer=setInterval(()=>{
    if(!document.getElementById('net-canvas')){stopNet();return;}
    const msgs=['Spring → MySQL : SELECT * FROM config','MySQL → Spring : {id:1, value:"prod"}','Spring → Toi : HTTP 200 OK'];
    const st=document.getElementById('net-status');
    if(st) st.textContent=msgs[netStep%3];
    drawNet(netStep%3,msgs[netStep%3]);
    netStep++;
  },1400);
}
function drawNet(step,msg){
  const cv=document.getElementById('net-canvas');if(!cv)return;
  const ctx=cv.getContext('2d'),W=660,H=240;
  ctx.clearRect(0,0,W,H);
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  // Network box
  ctx.strokeStyle='#D85A30';ctx.lineWidth=0.8;ctx.setLineDash([6,4]);
  rr(ctx,150,20,360,200,14);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#D85A30';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('app-network (réseau privé)',330,18);
  // Spring
  ctx.fillStyle=isDark?'#3C3489':'#EEEDFE';ctx.strokeStyle='#534AB7';ctx.lineWidth=step===0||step===2?1.5:0.5;
  rr(ctx,170,60,160,80,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#3C3489';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('Spring Boot',250,96);
  ctx.font='10px sans-serif';ctx.fillStyle='#534AB7';ctx.fillText('conteneur: spring-app',250,112);
  // MySQL
  ctx.fillStyle=isDark?'#085041':'#E1F5EE';ctx.strokeStyle='#1D9E75';ctx.lineWidth=step===0||step===1?1.5:0.5;
  rr(ctx,330,60,160,80,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#085041';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('MySQL',410,96);
  ctx.font='10px sans-serif';ctx.fillStyle='#0F6E56';ctx.fillText('conteneur: mysql-db',410,112);
  // Arrow
  if(step===0){arw(ctx,332,100,328,100,'#534AB7');}
  if(step===1){arw(ctx,328,104,332,104,'#1D9E75');}
  // PC
  ctx.fillStyle=isDark?'#0C447C':'#E6F1FB';ctx.strokeStyle='#185FA5';ctx.lineWidth=step===2?1.5:0.5;
  rr(ctx,10,80,120,50,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#0C447C';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('Ton PC',70,101);
  ctx.font='10px sans-serif';ctx.fillStyle='#185FA5';ctx.fillText('localhost:8080',70,116);
  if(step===2){arw(ctx,168,110,132,110,'#185FA5');}
  // msg bubble
  if(msg&&step>=0){
    const bw=Math.min(380,msg.length*6.5+20);
    ctx.fillStyle=isDark?'#3C3489':'#EEEDFE';ctx.strokeStyle='#534AB7';ctx.lineWidth=0.8;
    rr(ctx,(W-bw)/2,195,bw,30,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#3C3489';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(msg,W/2,215);
  }
}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function arw(ctx,x1,y1,x2,y2,col){ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();const a=Math.atan2(y2-y1,x2-x1),h=8;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-h*Math.cos(a-.4),y2-h*Math.sin(a-.4));ctx.lineTo(x2-h*Math.cos(a+.4),y2-h*Math.sin(a+.4));ctx.closePath();ctx.fill();}

function showYaml(i,btn){
  curY=i;
  document.querySelectorAll('[id^=y]').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  const y=YAML_EX[i];
  document.getElementById('yaml-box').innerHTML=`<div class="fade"><p style="font-size:14px;font-weight:500;color:var(--color-text-primary);margin:0 0 6px">${y.title}</p><pre class="code">${y.code}</pre><div class="card"><p style="font-size:13px;margin:0;line-height:1.7;color:var(--color-text-primary)">${y.expl}</p></div></div>`;
}

function showSection(k){
  const s=SECTIONS[k];
  document.getElementById('section-box').innerHTML=`<div class="fade"><p style="font-size:14px;font-weight:500;color:${s.color};margin:0 0 8px">${s.title}</p>${s.txt}</div>`;
}

let openCmd=-1;
function buildCmds(){
  const div=document.getElementById('cmd-list');if(!div)return;
  div.innerHTML=CMDS.map((c,i)=>`
    <div class="card" style="cursor:pointer;margin-bottom:8px" onclick="toggleCmd(${i})">
      <div style="display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <span class="pill ${c.badge}">${c.bl}</span>
        <code style="font-family:var(--font-mono);font-size:11px;flex:1;word-break:break-all;color:var(--color-text-primary)">${c.label}</code>
        <span style="font-size:12px;color:var(--color-text-secondary)">${openCmd===i?'▲':'▼'}</span>
      </div>
      <p style="font-size:12px;color:var(--color-text-secondary);margin:5px 0 0">${c.desc}</p>
      ${openCmd===i?`<div style="margin-top:10px;display:grid;grid-template-columns:auto 1fr;gap:6px 12px;align-items:start">${c.parts.map(p=>`<code style="font-family:var(--font-mono);font-size:11px;background:var(--color-background-secondary);padding:2px 6px;border-radius:4px;color:#534AB7;white-space:nowrap">${p.c}</code><span style="font-size:12px;color:var(--color-text-primary);line-height:1.6">${p.d}</span>`).join('')}</div>`:''}
    </div>`).join('');
}
function toggleCmd(i){openCmd=openCmd===i?-1:i;buildCmds();}

function tab(key,btn){
  stopNet();
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('zone').innerHTML=TABS[key];
  if(key==='entrypoint')showEp(0,document.getElementById('ep0'));
  if(key==='yaml')showYaml(0,document.getElementById('y0'));
  if(key==='network'){drawNet(-1,'');}
  if(key==='commandes')buildCmds();
}

tab('intro',document.querySelector('.nb'));
</script>
</body>
</html>
