.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;margin-right:3px}
.pb{background:#E6F1FB;color:#0C447C}.pg{background:#E1F5EE;color:#085041}.pp{background:#EEEDFE;color:#3C3489}.pa{background:#FAEEDA;color:#633806}.pc{background:#FAECE7;color:#712B13}.pr{background:#FCEBEB;color:#791F1F}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .2s ease}
@keyframes flow{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}
.fan{stroke-dasharray:6 4;animation:flow 1.1s linear infinite}
</style>

stages:`<div class="fade">
<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.7">
Les stages = les <strong>étapes</strong> du pipeline. Les jobs = les <strong>tâches</strong> dans chaque étape. Clique sur le bouton pour simuler.
</p>
<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap">
  <button class="nb" id="st-btn" onclick="toggleStages()">▶ Simuler le pipeline</button>

</div>
<canvas id="st-canvas" width="660" height="230" style="width:100%;border-radius:10px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);margin-bottom:10px"></canvas>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="card" style="border-left:3px solid #534AB7">
  <p style="font-size:12px;font-weight:500;color:#534AB7;margin:0 0 5px">Règles des stages</p>
  <p style="font-size:12px;color:var(--color-text-secondary);margin:0;line-height:1.8">
    ▶ Les stages s'exécutent <strong>dans l'ordre déclaré</strong><br>
    ▶ Tous les jobs d'un stage doivent réussir avant le suivant<br>
    ▶ Jobs du même stage → <strong>en parallèle</strong> (si plusieurs runners)<br>
    ▶ 1 job = 1 conteneur Docker neuf et vide
  </p>
</div>
<pre class="code" style="font-size:11px"><span class="kw">stages:</span>
  - build    <span class="cm">← 1er</span>
  - test     <span class="cm">← 2e</span>
  - deploy   <span class="cm">← 3e</span>

<span class="fl">frontend_build:</span>
  <span class="kw">stage:</span> build  <span class="cm">← en parallèle</span>
  <span class="kw">script:</span>
    - echo "Build frontend"

<span class="fl">backend_build:</span>
  <span class="kw">stage:</span> build  <span class="cm">← avec frontend_build</span>
  <span class="kw">script:</span>
    - echo "Build backend"</pre>
</div>
</div>`,

  yml:{t:'📄 .gitlab-ci.yml — la recette',c:'#534AB7',tx:'Fichier YAML à la RACINE de ton dépôt. Il définit tout : les stages, les jobs, les commandes, les conditions. C\'est la recette que GitLab exécute à chaque push.'},

  jobs:{t:'📦 Jobs — les tâches',c:'#0F6E56',tx:'Chaque job = une tâche dans un conteneur Docker neuf et vide. Build = compiler, Test = lancer les tests, Deploy = envoyer en prod. Chaque job tourne isolément des autres.'},
  token:{t:'🔑 Token — le badge d\'accès',c:'#854F0B',tx:'Généré sur GitLab (Settings > CI/CD > Runners). Le Runner en a besoin pour prouver qu\'il est autorisé à exécuter les pipelines de TON projet. ⚠️ Copie-le immédiatement, il disparaît !'},

const INS=[
{t:'① Lancer le conteneur Runner',code:`<span class="cm"># Télécharger l'image</span>
docker pull gitlab/gitlab-runner:latest

<span class="cm"># Démarrer le runner (Linux/GitBash - double // pour GitBash)</span>
docker run -d --name gitlab-runner --restart always \\
  -v //srv/gitlab-runner/config:/etc/gitlab-runner \\
  -v //var/run/docker.sock:/var/run/docker.sock \\
  gitlab/gitlab-runner:latest`,
tx:'<strong>--restart always</strong> = le Runner redémarre tout seul si Docker redémarre.<br><strong>-v /srv/...</strong> = sa config est sauvegardée sur ta machine (persiste entre redémarrages).<br><strong>-v /var/run/docker.sock</strong> = le Runner peut créer des conteneurs Docker pour les jobs.'},
{t:'② Créer le token sur GitLab',svg:`<svg width="100%" viewBox="0 0 680 130">
<defs><marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="190" y="20" width="130" height="38" rx="7" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/><text font-size="11" x="255" y="43" text-anchor="middle" fill="#085041">Runners → New</text>
<line x1="322" y1="39" x2="348" y2="39" stroke="#888780" stroke-width="1" marker-end="url(#a2)"/>
<rect x="350" y="20" width="200" height="38" rx="7" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/><text font-size="11" x="450" y="43" text-anchor="middle" fill="#633806">✅ Run untagged jobs → Generate</text>
<text font-size="11" x="340" y="88" text-anchor="middle" fill="#D85A30">⚠️ Copie le token MAINTENANT — affiché une seule fois !</text>
<text font-size="11" x="340" y="108" text-anchor="middle" fill="#888780">export RUNNER_TOKEN="glrt-xxxxxxxxxxxxx"</text>
</svg>`,
tx:'"Run untagged jobs" = le Runner accepte les jobs sans tag (les nôtres). Sans ça, aucun job ne démarre. Le token disparaît après quelques minutes — copie-le et exporte-le immédiatement dans ta variable RUNNER_TOKEN.'},
{t:'③ Enregistrer le Runner',code:`docker run --rm \\
  -v //srv/gitlab-runner/config:/etc/gitlab-runner \\
  gitlab/gitlab-runner register \\
    --non-interactive \\           <span class="cm">← pas de questions interactives</span>
    --url "https://git.esi-bru.be" \\   <span class="cm">← ton GitLab</span>
    --token "$RUNNER_TOKEN" \\     <span class="cm">← ton token exporté</span>
    --executor "docker" \\         <span class="cm">← créer des conteneurs Docker</span>
    --docker-image alpine:latest \\ <span class="cm">← image par défaut des jobs</span>
    --description "docker-runner"  <span class="cm">← nom visible dans GitLab</span>`,
tx:'Après cette commande, ton Runner apparaît dans Settings > CI/CD > Runners avec un point vert. Sans enregistrement, GitLab ne sait pas que ton Runner existe.'},
{t:'Le socket /var/run/docker.sock',svg:`<svg width="100%" viewBox="0 0 680 160">
<defs><marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="20" y="20" width="180" height="130" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="110" y="40" text-anchor="middle" fill="#0C447C">Ta machine hôte</text>
<rect x="36" y="50" width="148" height="36" rx="6" fill="#185FA5"/>

<text font-size="11" x="110" y="120" text-anchor="middle" fill="#633806">/var/run/docker.sock</text>
<line x1="202" y1="115" x2="278" y2="115" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#a3)"/>
<text font-size="10" x="240" y="107" text-anchor="middle" fill="#BA7517">volume -v</text>

<text font-size="11" font-weight="500" x="355" y="82" text-anchor="middle" fill="#085041">Runner conteneur</text>
<text font-size="10" x="355" y="100" text-anchor="middle" fill="#0F6E56">peut créer d'autres</text>
<text font-size="10" x="355" y="116" text-anchor="middle" fill="#0F6E56">conteneurs → les jobs</text>
<line x1="432" y1="95" x2="468" y2="95" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a3)"/>

<text font-size="11" font-weight="500" x="525" y="92" text-anchor="middle" fill="#3C3489">Job conteneur</text>
<text font-size="10" x="525" y="108" text-anchor="middle" fill="#534AB7">alpine, maven...</text>
</svg>`,
tx:'Le socket est comme un "téléphone interne" entre le Runner et le daemon Docker. En partageant ce socket, le Runner peut dire à Docker "crée un conteneur alpine pour ce job". Sans ça, le Runner ne peut pas créer les conteneurs des jobs.'},
{t:'Réenregistrer avec --docker-network-mode (Sonar)',code:`<span class="cm"># 1. Retirer le Runner dans GitLab (Settings > CI/CD)</span>
<span class="cm"># 2. Arrêter et supprimer le conteneur</span>
docker stop gitlab-runner && docker rm gitlab-runner

<span class="cm"># 3. Relancer le conteneur (même commande qu'avant)</span>
docker run -d --name gitlab-runner --restart always \\
  -v //srv/gitlab-runner/config:/etc/gitlab-runner \\
  -v //var/run/docker.sock:/var/run/docker.sock \\
  gitlab/gitlab-runner:latest

<span class="cm"># 4. Réenregistrer avec le réseau SonarQube</span>
docker run --rm \\
  -v //srv/gitlab-runner/config:/etc/gitlab-runner \\
  gitlab/gitlab-runner register \\
    --non-interactive \\
    --url "https://git.esi-bru.be" \\
    --token "$RUNNER_TOKEN" \\
    --executor "docker" \\
    --docker-image alpine:latest \\
    --description "docker-runner" \\
    --docker-network-mode "sonar-network"  <span class="cm">← NOUVEAU</span>`,
tx:'Pour que les jobs puissent parler à SonarQube (localhost:9000), ils doivent être sur le même réseau Docker. L\'option <code>--docker-network-mode "sonar-network"</code> connecte automatiquement tous les conteneurs de jobs à ce réseau.'},
{t:'Réenregistrer avec --docker-volumes (DinD)',code:`<span class="cm"># Même processus stop/rm/run que ci-dessus</span>
<span class="cm"># Réenregistrer avec le socket Docker en volume</span>

docker run --rm \\
  -v //srv/gitlab-runner/config:/etc/gitlab-runner \\
  gitlab/gitlab-runner register \\
    --non-interactive \\
    --url "https://git.esi-bru.be" \\
    --token "$RUNNER_TOKEN" \\
    --executor "docker" \\
    --docker-image alpine:latest \\
    --description "docker-runner" \\
    --docker-volumes /var/run/docker.sock:/var/run/docker.sock  <span class="cm">← NOUVEAU</span>`,
tx:'Pour Docker in Docker (construire des images Docker dans un job), les conteneurs des jobs doivent eux aussi avoir accès au socket Docker. On monte le socket en tant que volume dans chaque job via cette option.'},
];

const PRS=[
{t:'Hello World — le pipeline minimal',code:`<span class="cm"># .gitlab-ci.yml à la RACINE du projet</span>
<span class="fl">my_first_job:</span>       <span class="cm">← nom du job (affiché dans Build > Jobs)</span>
  <span class="kw">script:</span>            <span class="cm">← commandes à exécuter</span>
    - echo <span class="st">"Hello World!"</span>

<span class="cm"># Pour déclencher : git add . && git commit -m "..." && git push</span>
<span class="cm"># Voir les logs : Build > Jobs > cliquer sur le numéro du job</span>`,
tx:'Le pipeline le plus simple possible : un seul job, une seule commande. Dès que tu push ce fichier, GitLab crée automatiquement un pipeline et l\'exécute. Résultat visible dans Build > Jobs.'},
{t:'Condition shell avec | (bloc multiligne YAML)',code:`<span class="fl">my_first_job:</span>
  <span class="kw">script:</span>
    - echo <span class="st">"Hello!"</span>
    - |
      if [ <span class="st">"$MY_VARIABLE"</span> -eq 42 ]; then
        echo <span class="st">"La variable vaut 42 ✅"</span>
      else
        echo <span class="st">"Valeur inattendue : $MY_VARIABLE"</span>
      fi

<span class="cm"># Le | = Block Style Indicator YAML</span>
<span class="cm"># Permet d'écrire un bloc multiligne en préservant les retours à la ligne</span>`,
tx:'Le symbole <code>|</code> en YAML = tout ce qui suit est du texte multiligne. Les indentations et retours à la ligne sont préservés. Utile pour les scripts shell avec if/else, boucles, etc.'},
{t:'before_script & after_script',code:`<span class="fl">my_first_job:</span>
  <span class="kw">before_script:</span>
    - echo <span class="st">"Préparation..."</span>
    - apk update            <span class="cm">← update Alpine</span>
    - apk add curl          <span class="cm">← installe curl</span>
  <span class="kw">script:</span>
    - curl --version        <span class="cm">← maintenant disponible</span>
  <span class="kw">after_script:</span>
    - echo <span class="st">"Nettoyage..."</span>  <span class="cm">← toujours exécuté même si échec</span>`,
tx:'<strong>before_script</strong> = commandes avant le job principal (installer des outils, configurer l\'environnement).<br><strong>after_script</strong> = commandes après, MÊME si le job a échoué (nettoyage, rapport, notification). Important pour les logs.'},
{t:'image: — choisir l\'environnement Docker',code:`<span class="cm"># Sans image = alpine par défaut (pas de Java, pas de Maven !)</span>
<span class="fl">my_first_job:</span>
  <span class="kw">image:</span> maven:3.9.9-eclipse-temurin-23-alpine   <span class="cm">← Java + Maven inclus</span>
  <span class="kw">script:</span>
    - mvn --version   <span class="cm">← fonctionne !</span>

<span class="cm"># Autres exemples :</span>
<span class="cm"># image: python:3.8          → Python 3.8</span>
<span class="cm"># image: node:20             → Node.js</span>
<span class="cm"># image: docker:20.10.16     → Docker (pour DinD)</span>`,
tx:'Sans <code>image</code>, le job utilise l\'image par défaut définie lors de l\'enregistrement (alpine → très minimal, pas de Java, pas de Maven). Avec <code>image</code>, chaque job peut avoir son propre environnement sur mesure.'},
{t:'Job en échec — exit 1',code:`<span class="fl">my_first_job:</span>
  <span class="kw">script:</span>
    - mvn --version   <span class="cm">← ❌ Maven non installé dans alpine → FAILED</span>

<span class="cm"># Ou simuler un échec intentionnel :</span>
<span class="fl">build-job:</span>
  <span class="kw">script:</span>
    - echo <span class="st">"Compilation..."</span>
    - exit 1          <span class="cm">← force l'échec</span>

<span class="cm"># Voir le statut : Build > Jobs → rouge = FAILED</span>
<span class="cm"># Voir la cause : cliquer sur le job → lire les logs</span>`,
tx:'Si une commande échoue (exit code ≠ 0), le job passe en FAILED et le pipeline s\'arrête. <code>exit 1</code> simule un échec volontaire. Très utile pour tester le comportement du pipeline en cas d\'erreur.'},
{t:'Variables prédéfinies par GitLab',code:`<span class="fl">mon_job:</span>
  <span class="kw">script:</span>
    - echo <span class="st">"URL: $CI_PROJECT_URL"</span>
    - echo <span class="st">"Auteur: $CI_COMMIT_AUTHOR"</span>
    - echo <span class="st">"Branche: $CI_COMMIT_BRANCH"</span>
    - echo <span class="st">"Tag: $CI_COMMIT_TAG"</span>
    - echo <span class="st">"Ref: $CI_COMMIT_REF_NAME"</span>
    - echo <span class="st">"Dossier projet: $CI_PROJECT_DIR"</span>

<span class="cm"># GitLab injecte automatiquement +50 variables dans chaque job</span>
<span class="cm"># Doc complète : docs.gitlab.com/ci/variables/predefined_variables/</span>`,
tx:'GitLab injecte automatiquement des dizaines de variables dans chaque job : qui a fait le commit, sur quelle branche, quel tag, l\'URL du projet... Tu peux les utiliser directement avec $ sans les déclarer.'},
];

{t:'Déclarer dans le .yml (visible dans les logs)',code:`<span class="cm"># Globales — disponibles dans TOUS les jobs</span>

{t:'Via l\'interface GitLab (secrète / masquée)',svg:`<svg width="100%" viewBox="0 0 680 170">
<rect x="20" y="10" width="640" height="150" rx="10" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>

<text font-size="11" x="36" y="58" fill="#534AB7" font-weight="500">Key :</text><text font-size="11" x="110" y="58" fill="var(--color-text-secondary)">MY_VARIABLE  (le nom, ex: SONAR_TOKEN, SSH_PRIVATE_KEY)</text>
<text font-size="11" x="36" y="78" fill="#534AB7" font-weight="500">Value :</text><text font-size="11" x="110" y="78" fill="var(--color-text-secondary)">42  (la valeur, ex: glpat-xxxx, clé privée SSH)</text>

<text font-size="11" x="36" y="118" fill="#534AB7" font-weight="500">Protected :</text><text font-size="11" x="110" y="118" fill="var(--color-text-secondary)">✅ Cocher → accessible uniquement sur branches protégées (main...)</text>
<text font-size="11" x="36" y="138" fill="#D85A30" font-weight="500">Environnements :</text><text font-size="11" x="160" y="138" fill="var(--color-text-secondary)">All → disponible dans tous les envs (ou choisir un env spécifique)</text>

</svg>`,
tx:'Pour les mots de passe, tokens, clés API : JAMAIS dans le fichier YAML (visible dans Git). Utilise toujours l\'interface GitLab. Les variables Masked ne s\'affichent pas dans les logs même si tu fais echo.'},
{t:'Masked vs Protected — quelle différence ?',svg:`<svg width="100%" viewBox="0 0 680 150">
<rect x="20" y="10" width="300" height="120" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="170" y="32" text-anchor="middle" fill="#3C3489">Masked = cachée dans les LOGS</text>
<text font-size="11" x="36" y="56" fill="#534AB7">echo "$MY_PASS" dans le script</text>
<text font-size="11" x="36" y="74" fill="#534AB7">→ logs affichent : [MASKED]</text>
<text font-size="11" x="36" y="92" fill="#534AB7">Visible dans Settings > Variables</text>
<text font-size="11" x="36" y="118" fill="#888780">Cas : SONAR_TOKEN, SSH_PRIVATE_KEY</text>
<rect x="360" y="10" width="300" height="120" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="510" y="32" text-anchor="middle" fill="#085041">Protected = branche protégée seulement</text>
<text font-size="11" x="376" y="56" fill="#0F6E56">Disponible UNIQUEMENT si le</text>
<text font-size="11" x="376" y="74" fill="#0F6E56">pipeline tourne sur "main"</text>
<text font-size="11" x="376" y="92" fill="#0F6E56">Invisible sur feature/*, dev...</text>

</svg>`,
tx:'Tu peux combiner les deux ! Masked + Protected = variable cachée dans les logs ET accessible seulement sur main. Idéal pour les tokens de déploiement en production.'},
{t:'Variable de type Fichier',code:`<span class="cm"># Dans Settings > CI/CD > Variables</span>

{t:'Artifact vs Cache — la différence essentielle',svg:`<svg width="100%" viewBox="0 0 680 170">

const WHD=[
{t:'when: on_failure — réagir à un échec',code:`<span class="kw">stages:</span>
  - build
  - test
  - notify

<span class="fl">build-job:</span>
  <span class="kw">stage:</span> build
  <span class="kw">script:</span>

<span class="fl">test-job:</span>
  <span class="kw">stage:</span> test
  <span class="kw">script:</span>

<span class="fl">notify-job:</span>
  <span class="kw">stage:</span> notify
  <span class="kw">script:</span>
    - echo <span class="st">"🚨 Notification d'échec envoyée !"</span>
  <span class="kw">when:</span> on_failure   <span class="cm">← s'exécute PARCE QUE build a échoué</span>`,
tx:'Quand build échoue → test est SAUTÉ → notify s\'exécute car <code>when: on_failure</code>. Parfait pour envoyer une notification Slack, email, ou faire un rollback de base de données.'},
{t:'when: always — toujours exécuter',code:`<span class="fl">cleanup-job:</span>
  <span class="kw">stage:</span> cleanup
  <span class="kw">script:</span>

<span class="cm"># Utile pour : rapports, nettoyage, archivage</span>`,

{t:'git tag — créer et pousser un tag',code:`<span class="cm"># Créer un tag sur le commit actuel</span>

<span class="cm"># Voir tous les tags</span>

{t:'Pipeline avec Docker in Docker',code:`<span class="fl">docker_build:</span>
  <span class="kw">stage:</span> docker_build
  <span class="kw">image:</span> docker:20.10.16         <span class="cm">← image Docker CLI</span>
  <span class="kw">services:</span>
    - docker:20.10.16-dind      <span class="cm">← service Docker daemon</span>
  <span class="kw">variables:</span>
    DOCKER_TLS_CERTDIR: <span class="st">"/certs"</span>  <span class="cm">← obligatoire pour DinD</span>
  <span class="kw">script:</span>
    - docker build -t $DOCKER_USERNAME/4dop1dr-image:$CI_COMMIT_REF_NAME .
    - docker push $DOCKER_USERNAME/4dop1dr-image:$CI_COMMIT_REF_NAME

<span class="cm"># $DOCKER_USERNAME = variable masquée dans Settings > CI/CD > Variables</span>
<span class="cm"># $CI_COMMIT_REF_NAME = nom de la branche ou du tag (ex: "main", "v1.0")</span>`,
tx:'<code>services</code> = un conteneur qui tourne en parallèle du job principal. Ici c\'est le daemon Docker (dind). Le job principal (CLI) lui parle pour construire et pousser l\'image. <code>$CI_COMMIT_REF_NAME</code> permet de tagger l\'image avec le nom de la branche.'},
{t:'Réenregistrer le Runner pour DinD',code:`<span class="cm"># 1. Retirer le Runner de GitLab (Settings > CI/CD)</span>
<span class="cm"># 2. Arrêter et supprimer le conteneur actuel</span>
docker stop gitlab-runner && docker rm gitlab-runner

<span class="cm"># 3. Relancer le Runner</span>
docker run -d --name gitlab-runner --restart always \\
  -v //srv/gitlab-runner/config:/etc/gitlab-runner \\
  -v //var/run/docker.sock:/var/run/docker.sock \\
  gitlab/gitlab-runner:latest

<span class="cm"># 4. Réenregistrer avec --docker-volumes pour DinD</span>
docker run --rm \\
  -v //srv/gitlab-runner/config:/etc/gitlab-runner \\
  gitlab/gitlab-runner register \\
    --non-interactive \\
    --url "https://git.esi-bru.be" \\
    --token "$RUNNER_TOKEN" \\
    --executor "docker" \\
    --docker-image alpine:latest \\
    --description "docker-runner" \\
    --docker-volumes /var/run/docker.sock:/var/run/docker.sock`,
tx:'Pour DinD, le Runner doit passer le socket Docker aux conteneurs de jobs (via --docker-volumes). Comme ça, le job peut utiliser docker build/push directement.'},
];

/* ══ STAGES ANIMATION ══ */
let stTimer=null,stRunning=false,stStep=-1;
const STAGES=[
  {n:'build',color:'#378ADD',jobs:['compile_frontend','compile_backend'],parallel:true},
  {n:'test',color:'#1D9E75',jobs:['test_job'],parallel:false},
  {n:'deploy',color:'#D85A30',jobs:['deploy_job'],parallel:false},
];
function toggleStages(){
  stRunning?stopSt():startSt();
  const b=document.getElementById('st-btn');
  if(b)b.textContent=stRunning?'⏹ Arrêter':'▶ Simuler le pipeline';
}
function stopSt(){clearInterval(stTimer);stRunning=false;stStep=-1;const b=document.getElementById('st-btn');if(b)b.textContent='▶ Simuler le pipeline';}
function startSt(){
  stRunning=true;stStep=0;drawSt(-1);
  stTimer=setInterval(()=>{
    if(!document.getElementById('st-canvas')){stopSt();return;}
    if(stStep>=STAGES.length){
      const s=document.getElementById('st-status');if(s)s.textContent='✅ Pipeline PASSED !';
      stopSt();drawSt(STAGES.length);return;
    }
    const s=document.getElementById('st-status');
    if(s)s.textContent=`⚙️ Stage en cours : "${STAGES[stStep].n}"…`;
    drawSt(stStep);stStep++;
  },1300);
}
function drawSt(cur){
  const cv=document.getElementById('st-canvas');if(!cv)return;
  const ctx=cv.getContext('2d'),W=660,H=230;
  ctx.clearRect(0,0,W,H);
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const sw=180,gap=20,ox=16;
  STAGES.forEach((st,i)=>{
    const x=ox+i*(sw+gap);
    const done=i<cur,active=i===cur;
    const bg=done?(isDark?'rgba(29,158,117,0.2)':'#E1F5EE'):active?(isDark?`rgba(55,138,221,0.2)`:`rgba(55,138,221,0.1)`):(isDark?'#2C2C2A':'#F1EFE8');
    ctx.fillStyle=bg;ctx.strokeStyle=done?'#1D9E75':active?st.color:'#B4B2A9';ctx.lineWidth=done||active?1.5:0.5;
    rrx(ctx,x,14,sw,206,10);ctx.fill();ctx.stroke();
    ctx.fillStyle=done?'#085041':active?st.color:'#888780';
    ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText((done?'✅ ':active?'⚙️ ':'⏳ ')+st.n,x+sw/2,44);
    if(st.parallel&&st.jobs.length>1){
      ctx.font='9px sans-serif';ctx.fillStyle='#888780';
      ctx.fillText('(parallèle)',x+sw/2,58);
    }
    st.jobs.forEach((j,ji)=>{
      const jy=70+ji*70;
      ctx.fillStyle=done?(isDark?'rgba(29,158,117,0.3)':'#9FE1CB'):active?(isDark?'rgba(55,138,221,0.15)':'rgba(55,138,221,0.08)'):(isDark?'#444441':'#D3D1C7');
      ctx.strokeStyle=done?'#1D9E75':active?st.color:'#B4B2A9';ctx.lineWidth=0.5;
      rrx(ctx,x+10,jy,sw-20,54,6);ctx.fill();ctx.stroke();
      ctx.fillStyle=done?'#085041':active?st.color:'#888780';ctx.font='11px sans-serif';
      ctx.fillText(j,x+sw/2,jy+22);
      ctx.font='9px sans-serif';ctx.fillStyle='#888780';
      ctx.fillText('1 conteneur Docker',x+sw/2,jy+40);
    });
    if(i<STAGES.length-1){
      ctx.strokeStyle=done?'#1D9E75':'#B4B2A9';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(x+sw+2,117);ctx.lineTo(x+sw+gap-2,117);ctx.stroke();
      ctx.fillStyle=done?'#1D9E75':'#B4B2A9';ctx.beginPath();
      ctx.moveTo(x+sw+gap-2,112);ctx.lineTo(x+sw+gap+4,117);ctx.lineTo(x+sw+gap-2,122);ctx.fill();
    }
  });
}
function rrx(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

/* ══ FONCTIONS ══ */
function xi(k){const e=XI[k];document.getElementById('xi-box').innerHTML=`<div class="fade"><p style="font-size:14px;font-weight:500;color:${e.c};margin:0 0 5px">${e.t}</p><p style="font-size:13px;margin:0;line-height:1.7;color:var(--color-text-primary)">${e.tx}</p></div>`;}
function mkBox(data,i,arr,prefix){
  const d=arr[i];
  const body=d.code?`<pre class="code">${d.code}</pre>`:d.svg?`<div style="margin:6px 0">${d.svg}</div>`:'';
  document.getElementById(prefix+'-box').innerHTML=`<div class="fade"><p style="font-size:14px;font-weight:500;color:var(--color-text-primary);margin:0 0 8px">${d.t}</p>${body}<div class="card"><p style="font-size:13px;margin:0;line-height:1.7;color:var(--color-text-primary)">${d.tx}</p></div></div>`;
}
function si(i,btn){document.querySelectorAll('[id^=in]').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');mkBox(null,i,INS,'in');}
function sp(i,btn){document.querySelectorAll('[id^=pr]').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');mkBox(null,i,PRS,'pr');}
function sv(i,btn){document.querySelectorAll('[id^=va]').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');mkBox(null,i,VAS,'va');}
function sar(i,btn){document.querySelectorAll('[id^=ar]').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');mkBox(null,i,ARS,'ar');}
function sca(i,btn){document.querySelectorAll('[id^=ca]').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');mkBox(null,i,CAS,'ca');}
function swh(i,btn){document.querySelectorAll('[id^=wh]').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');mkBox(null,i,WHD,'wh');}
function sso(i,btn){document.querySelectorAll('[id^=so]').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');mkBox(null,i,SOS,'so');}
function sdi(i,btn){document.querySelectorAll('[id^=di]').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');mkBox(null,i,DIS,'di');}

let oCmd=-1;
function buildCmds(){
  const div=document.getElementById('cmd-list');if(!div)return;
  div.innerHTML=CMDS.map((c,i)=>`
    <div class="card" style="cursor:pointer;margin-bottom:8px" onclick="tCmd(${i})">
      <div style="display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <span class="pill ${c.b}">${c.bl}</span>
        <code style="font-family:var(--font-mono);font-size:11px;flex:1;word-break:break-all;color:var(--color-text-primary)">${c.l}</code>
        <span style="font-size:11px;color:var(--color-text-secondary)">${oCmd===i?'▲':'▼'}</span>
      </div>
      <p style="font-size:12px;color:var(--color-text-secondary);margin:5px 0 0">${c.d}</p>
      ${oCmd===i?`<div style="margin-top:10px;display:grid;grid-template-columns:auto 1fr;gap:6px 12px;align-items:start">${c.ps.map(p=>`<code style="font-family:var(--font-mono);font-size:11px;background:var(--color-background-secondary);padding:2px 6px;border-radius:4px;color:#534AB7;white-space:nowrap">${p.c}</code><span style="font-size:12px;color:var(--color-text-primary);line-height:1.6">${p.d}</span>`).join('')}</div>`:''}
    </div>`).join('');
}
function tCmd(i){oCmd=oCmd===i?-1:i;buildCmds();}

function tab(key,btn){
  stopSt();
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('zone').innerHTML=TABS[key];
  if(key==='install'){si(0,document.getElementById('in0'));}
  if(key==='premiers'){sp(0,document.getElementById('pr0'));}
  if(key==='variables'){sv(0,document.getElementById('va0'));}
  if(key==='stages')setTimeout(()=>drawSt(-1),50);
  if(key==='artifacts'){sar(0,document.getElementById('ar0'));}
  if(key==='cache'){sca(0,document.getElementById('ca0'));}
  if(key==='when'){swh(0,document.getElementById('wh0'));}
  if(key==='sonar'){sso(0,document.getElementById('so0'));}
  if(key==='dind'){sdi(0,document.getElementById('di0'));}
  if(key==='commandes')buildCmds();
}
tab('intro',document.querySelector('.nb'));
</script>
