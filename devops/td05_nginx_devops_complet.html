</p>

  <defs><marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.7">

<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
  <div class="card" style="border-left:3px solid #D85A30">
    <p style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin:0 0 4px">Sans Docker Compose</p>
    <pre class="code" style="font-size:11px">docker network create my-net
docker run --network my-net \\
  --name no-db ...

  --name nginx-proxy ...
<span style="color:#D85A30">→ 3 commandes, risque d'oubli</span></pre>

  <div class="card" style="border-left:3px solid #1D9E75">
    <p style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin:0 0 4px">Avec Docker Compose</p>
    <pre class="code" style="font-size:11px">docker-compose up

<span style="color:#1D9E75">→ 1 commande, tout démarre</span>
<span style="color:#1D9E75">  réseau créé automatiquement</span></pre>
  </div>
</div>

<pre class="code"><span class="cm"># docker-compose.yml — structure</span>
<span class="kw">services:</span>
  <span class="fl">app:</span>                     <span class="cm"># nom du service</span>
    <span class="kw">build:</span> ./              <span class="cm"># construit l'image depuis le Dockerfile local</span>
    <span class="kw">container_name:</span> no-db  <span class="cm"># nom du conteneur</span>
    <span class="kw">ports:</span>
      - <span class="st">"8082:8080"</span>          <span class="cm"># hôte:conteneur</span>
    <span class="kw">networks:</span>
      - app-network

  <span class="fl">nginx:</span>
    <span class="kw">image:</span> nginx:latest      <span class="cm"># image depuis Docker Hub</span>
    <span class="kw">volumes:</span>
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:<span class="nm">ro</span>
    <span class="kw">ports:</span>
      - <span class="st">"8080:80"</span>
    <span class="kw">depends_on:</span>
      - app                  <span class="cm"># nginx attend que app soit démarré</span>
    <span class="kw">networks:</span>
      - app-network

<span class="fl">networks:</span>
  app-network:
    <span class="kw">driver:</span> bridge           <span class="cm"># réseau privé entre conteneurs</span></pre>

<div class="card">
  <p style="font-size:13px;font-weight:500;margin:0 0 8px;color:var(--color-text-primary)">Commandes Docker Compose essentielles</p>
  <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:12px;align-items:center">
    <code style="font-family:var(--font-mono);color:#534AB7">docker-compose up</code><span style="color:var(--color-text-secondary)">Démarre tous les services (build si image absente)</span>
    <code style="font-family:var(--font-mono);color:#534AB7">docker-compose up --build</code><span style="color:var(--color-text-secondary)">Force la reconstruction des images</span>

  </div>
</div>
</div>`

      { code:'/demo-no-db', desc:'Route configurée dans nginx.conf → redirigée vers /config de Spring Boot' },
    ]
  },
];

/* ══════════════════════ LB ANIMATION ══════════════════════ */
let lbTimer = null, lbRunning = false, lbSpeed = 1200;
let counts = [0,0,0], reqTotal = 0, lbCur = 0;
const COLORS = ['#378ADD','#1D9E75','#D85A30'];

function setSpd(v){ lbSpeed = parseInt(v); if(lbRunning){ stopLB(); startLB(); } }
function toggleLB(){
  lbRunning ? stopLB() : startLB();
  document.getElementById('lb-btn').textContent = lbRunning ? '⏹ Arrêter' : '▶ Lancer des requêtes';
}
function stopLB(){ clearInterval(lbTimer); lbRunning=false; if(document.getElementById('lb-btn')) document.getElementById('lb-btn').textContent='▶ Lancer des requêtes'; }
function startLB(){
  lbRunning=true;
  lbTimer = setInterval(()=>{
    if(!document.getElementById('lb-canvas')){ stopLB(); return; }
    const t = lbCur % 3;
    counts[t]++;
    reqTotal++;
    lbCur++;
    ['c1','c2','c3'].forEach((id,i)=>{ const el=document.getElementById(id); if(el) el.textContent=`app${i+1} : ${counts[i]}`; });
    const el=document.getElementById('req-count'); if(el) el.textContent=reqTotal+' requêtes';
    drawLB(t);
  }, lbSpeed);
}

function drawLB(active){
  const c = document.getElementById('lb-canvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  const W=660,H=270;
  ctx.clearRect(0,0,W,H);
  const isDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const tc = isDark?'#9c9a92':'#73726c';
  const bc = isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';

  // User
  ctx.fillStyle=isDark?'#0C447C':'#E6F1FB'; ctx.strokeStyle='#185FA5'; ctx.lineWidth=0.5;
  roundRect(ctx,20,110,90,44,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#0C447C'; ctx.font='12px sans-serif'; ctx.textAlign='center';
  ctx.fillText('User',65,137);

  // NGINX box
  ctx.fillStyle=isDark?'#3C3489':'#EEEDFE'; ctx.strokeStyle='#534AB7'; ctx.lineWidth=1;
  roundRect(ctx,160,90,120,84,10); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#3C3489'; ctx.font='bold 13px sans-serif';
  ctx.fillText('NGINX',220,120);
  ctx.font='10px sans-serif'; ctx.fillStyle='#534AB7';
  ctx.fillText('load balancer',220,138);

  // Arrow user → nginx
  ctx.strokeStyle='#378ADD'; ctx.lineWidth=2;
  arrow(ctx,112,132,158,132);

  // 3 app boxes
  const apps=[{y:60},{y:133},{y:206}];
  apps.forEach((ap,i)=>{
    const isAct = i===active;
    ctx.fillStyle=isAct?(isDark?'#085041':'#9FE1CB'):(isDark?'#04342C':'#E1F5EE');
    ctx.strokeStyle=isAct?'#1D9E75':'#0F6E56'; ctx.lineWidth=isAct?1.5:0.5;
    roundRect(ctx,400,ap.y,170,50,8); ctx.fill(); ctx.stroke();
    ctx.fillStyle=isAct?'#085041':'#0F6E56';
    ctx.font=(isAct?'bold ':'')+'12px sans-serif';
    ctx.fillText(`Spring Boot app${i+1}`,485,ap.y+20);
    ctx.font='10px sans-serif'; ctx.fillStyle='#888780';
    ctx.fillText(`requêtes : ${counts[i]}`,485,ap.y+36);

    // Arrow nginx → app
    const col = i===active?COLORS[i]:'rgba(136,135,128,0.3)';
    ctx.strokeStyle=col; ctx.lineWidth=i===active?2:1;
    arrow(ctx,282,132,398,ap.y+25);
  });

  // Label active
  if(active>=0){
    ctx.fillStyle='#1D9E75'; ctx.font='11px sans-serif'; ctx.textAlign='left';
    ctx.fillText(`→ redirige vers app${active+1}`,162,87);
  }

  // upstream label
  ctx.strokeStyle='#D85A30'; ctx.lineWidth=0.8; ctx.setLineDash([5,4]);
  roundRect(ctx,390,44,200,230,10); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#D85A30'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('upstream spring-backend',490,42);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function arrow(ctx,x1,y1,x2,y2){
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1),h=8;
  ctx.fillStyle=ctx.strokeStyle;ctx.beginPath();
  ctx.moveTo(x2,y2);ctx.lineTo(x2-h*Math.cos(a-.4),y2-h*Math.sin(a-.4));
  ctx.lineTo(x2-h*Math.cos(a+.4),y2-h*Math.sin(a+.4));ctx.closePath();ctx.fill();
}

/* ══════════════════════ ONGLETS ══════════════════════ */
function tab(key, btn){
  stopLB();
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  document.getElementById('zone').innerHTML = TABS[key];
  if(key==='commandes') buildCmds();
  if(key==='lb'){ counts=[0,0,0];reqTotal=0;lbCur=0; drawLB(-1); }
}

function explain(k){
  const e=EXP[k];
  document.getElementById('explain-box').innerHTML=`
    <div class="fade">
      <p style="font-size:14px;font-weight:500;color:${e.color};margin:0 0 6px">${e.title}</p>
      <p style="font-size:13px;color:var(--color-text-primary);margin:0;line-height:1.7">${e.text}</p>
    </div>`;
}

/* ══════════════════════ COMMANDES ══════════════════════ */
let openCmd = -1;
function buildCmds(){
  const div=document.getElementById('cmd-list');
  div.innerHTML = CMDS.map((c,i)=>`
    <div class="card" style="cursor:pointer;margin-bottom:8px" onclick="toggleCmd(${i})">
      <div style="display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <span class="pill ${c.badge}">${c.badgeLabel}</span>
        <code style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-primary);flex:1;word-break:break-all">${c.label}</code>
        <span style="font-size:12px;color:var(--color-text-secondary)">${openCmd===i?'▲':'▼'}</span>
      </div>
      <p style="font-size:12px;color:var(--color-text-secondary);margin:6px 0 0">${c.desc}</p>
      <div id="cmd-detail-${i}" style="display:${openCmd===i?'block':'none'}">
        <div style="margin-top:10px;display:grid;grid-template-columns:auto 1fr;gap:6px 12px;align-items:start">
          ${c.parts.map(p=>`
            <code style="font-family:var(--font-mono);font-size:11px;background:var(--color-background-secondary);padding:2px 6px;border-radius:4px;color:#534AB7;white-space:nowrap">${p.code}</code>
            <span style="font-size:12px;color:var(--color-text-primary);line-height:1.6">${p.desc}</span>
          `).join('')}
        </div>
      </div>
    </div>`).join('');
}
function toggleCmd(i){
  openCmd = openCmd===i ? -1 : i;
  buildCmds();
}

/* ══════════════════════ INIT ══════════════════════ */
tab('concepts', document.querySelector('.nb'));
</script>
